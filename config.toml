[server]
host = "0.0.0.0"
port = 3000

[data]
root = "./example"
db   = "./data/hashcards.db"

[fsrs]
target_recall = 0.9
min_interval  = 1.0
max_interval  = 256.0

# Each [[session]] defines one drill route.
# title  — display name shown on the index page (defaults to deck name or "All Decks")
# deck   — filter by deck name; omit or leave empty to drill all decks
#
# Other optional fields:
#   card_limit      = 0      # max cards per session, 0 = no limit
#   new_card_limit  = 0      # max new cards per session, 0 = no limit
#   answer_controls = "full" # "full" (Forgot/Hard/Good/Easy) or "binary" (Forgot/Good)
#   bury_siblings   = true   # bury sibling cloze cards within a session

[[session]]
title = "All"

[[session]]
title = "Math"
deck  = "Math"

[[session]]
#title = "Chemical"
deck  = "Chemistry"

[[session]]
title = "no art, no life"
deck  = "no art, no life"

[[session]]
#title = "Chemical"
deck  = "Language"
