services:
  hashcards:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./cards:/hashcards/cards
      - ./pb_data:/hashcards/data
    # env_file:
    #  - hashcards.env
    environment:
      - TZ=Asia/Tokyo
      #
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - DATA_ROOT=./cards
      - FSRS_TARGET_RECALL=0.9
      - FSRS_MIN_INTERVAL=1.0
      - FSRS_MAX_INTERVAL=256.0
      #
      - DRILL_CARD_LIMIT=0
      - DRILL_NEW_CARD_LIMIT=0
      - DRILL_ANSWER_CONTROLS=full # or binary
      - DRILL_BURY_SIBLINGS=true

# Other optional fields:
#   card_limit      = 0      # max cards per session, 0 = no limit
#   new_card_limit  = 0      # max new cards per session, 0 = no limit
#   answer_controls = "full" # "full" (Forgot/Hard/Good/Easy) or "binary" (Forgot/Good)
#   bury_siblings   = true   # bury sibling cloze cards within a session
