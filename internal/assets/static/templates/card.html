{{define "head_extra"}}<noscript><style>.card-content { opacity: 1 !important; }</style></noscript>{{end}}

{{define "content"}}
<div class="root">
  <div class="header">
    <form class="reset-form" action="{{.BasePath}}" method="post">
      <button class="btn" type="submit" name="action" value="Reset" title="Discard session and return home">Reset</button>
    </form>
    <div class="progress-bar">
      <div class="progress-fill" style="width: {{.ProgressPct}}%;"></div>
    </div>
  </div>

  <div class="card-container">
    <div class="card">
      <div class="card-header"><h1>{{.DeckName}}</h1></div>
      <div class="card-content">
        {{if .Revealed}}{{.Back}}{{else}}{{.Front}}{{end}}
      </div>
    </div>
  </div>

  <div class="controls">
    <form action="{{.BasePath}}" method="post">
      {{if .CanUndo}}
        <input id="undo" class="btn" type="submit" name="action" value="Undo" title="Undo last action. Shortcut: u.">
      {{else}}
        <input id="undo" class="btn" type="submit" name="action" value="Undo" disabled>
      {{end}}

      <div class="spacer"></div>

      {{if .Revealed}}
        <div class="grades">
          {{if eq .AnswerControls "binary"}}
            <input id="forgot" class="btn" type="submit" name="action" value="Forgot" title="Mark card as forgotten. Shortcut: 1.">
            <input id="good"   class="btn" type="submit" name="action" value="Good"   title="Mark card as remembered well. Shortcut: 3.">
          {{else}}
            <input id="forgot" class="btn" type="submit" name="action" value="Forgot" title="Forgot. Shortcut: 1.">
            <input id="hard"   class="btn" type="submit" name="action" value="Hard"   title="Hard. Shortcut: 2.">
            <input id="good"   class="btn" type="submit" name="action" value="Good"   title="Good. Shortcut: 3.">
            <input id="easy"   class="btn" type="submit" name="action" value="Easy"   title="Easy. Shortcut: 4.">
          {{end}}
        </div>
      {{else}}
        <input id="reveal" class="btn" type="submit" name="action" value="Reveal" title="Show the answer. Shortcut: space.">
      {{end}}

      <div class="spacer"></div>

      <input id="end" class="btn" type="submit" name="action" value="End" title="End the session (changes are saved)">
    </form>
  </div>
</div>
{{end}}

{{define "scripts"}}
<script>{{.MacrosJS}}</script>
<script src="/static/script.js"></script>
{{end}}
