[server]
host = "0.0.0.0"
port = 3000

[data]
root = "./cards"


[fsrs]
target_recall = 0.9
min_interval = 1.0
max_interval = 256.0


# Drill sessions are no longer configured here. "serve" automatically
# creates one session per deck found under [data].root (the filename of
# each *.json deck file, minus the extension, becomes both the deck name
# and the session), plus a combined "All Decks" session.


# Other optional fields:
#   card_limit      = 0      # max cards per session, 0 = no limit
#   new_card_limit  = 0      # max new cards per session, 0 = no limit
#   answer_controls = "full" # "full" (Forgot/Hard/Good/Easy) or "binary" (Forgot/Good)
#   bury_siblings   = true   # bury sibling cloze cards within a session
