{{define "content"}}
<div class="finished">
  <h1>Session Completed 🎉</h1>
  <div class="summary">Reviewed {{.Reviewed}} cards in {{.DurationSec}} seconds.</div>
  <h2>Session Stats</h2>
  <div class="stats">
    <table>
      <tr><td class="key">Total Cards</td><td class="val">{{.Total}}</td></tr>
      <tr><td class="key">Cards Reviewed</td><td class="val">{{.Reviewed}}</td></tr>
      <tr><td class="key">Duration (seconds)</td><td class="val">{{.DurationSec}}</td></tr>
    </table>
  </div>
  <div class="shutdown-container">
    <form action="{{.BasePath}}" method="post">
      <button class="action-btn reset-btn" type="submit" name="action" value="Reset" title="Start a new session for today">
        Reset
      </button>
    </form>
    <a href="/" class="action-btn home-btn" title="Return home">
      Return home
    </a>
  </div>
</div>
{{end}}
