<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hashcards</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/static/style.css">
<style>
.index-wrap {
    max-width: 600px;
    margin: 80px auto;
    padding: 0 24px;
}
.index-wrap h1 {
    font-size: 48px;
    margin-bottom: 48px;
    text-align: center;
}
.session-list {
    list-style: none;
    padding: 0;
}
.session-list li {
    margin-bottom: 16px;
}
.session-link {
    display: block;
    background: white;
    border: 1px solid #999;
    padding: 16px 24px;
    font-size: 24px;
    font-family: "TeX Gyre Termes", "Nimbus Roman No9 L", "Times New Roman", serif;
    text-decoration: none;
    color: black;
    border-radius: 6px;
    box-shadow: #ccc 0px 1px 3px 0px;
    transition: background-color 0.15s, box-shadow 0.15s;
}
.session-link:hover {
    background: #f0f0f0;
    box-shadow: #bbb 0px 2px 5px 0px;
}
.index-message {
    text-align: center;
    color: #888;
    font-size: 20px;
    font-family: system-ui, -apple-system, sans-serif;
}
</style>
</head>
<body>
<div class="index-wrap">
    <h1>Hashcards</h1>
    <ul class="session-list" id="session-list">
        <li class="index-message">Loading...</li>
    </ul>
</div>
<script>
fetch('/api/sessions')
    .then(function(r) { return r.json(); })
    .then(function(sessions) {
        var list = document.getElementById('session-list');
        if (!sessions || sessions.length === 0) {
            list.innerHTML = '<li class="index-message">No sessions configured.</li>';
            return;
        }
        list.innerHTML = '';
        sessions.forEach(function(s) {
            var li = document.createElement('li');
            var a = document.createElement('a');
            a.href = s.drill_url;
            a.textContent = s.name;
            a.className = 'session-link';
            li.appendChild(a);
            list.appendChild(li);
        });
    })
    .catch(function() {
        document.getElementById('session-list').innerHTML =
            '<li class="index-message">Failed to load sessions.</li>';
    });
</script>
</body>
</html>
