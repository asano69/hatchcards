{{ define "base" }}
  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover"
      />
      <meta name="color-scheme" content="dark light" />
      <title>Hashcards</title>

      <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />

      <!-- Styles -->
      <link rel="stylesheet" href="/static/css/tokens.css" />
      <link rel="stylesheet" href="/static/css/base.css" />
      <link rel="stylesheet" href="/static/css/components.css" />
      <link rel="stylesheet" href="/static/css/index.css" />
      <link rel="stylesheet" href="/static/css/drill.css" />
      <link rel="stylesheet" href="/static/css/done.css" />
      <link rel="stylesheet" href="/static/css/new.css" />

      <!-- KaTeX and syntax highlighting -->
      <link rel="stylesheet" href="/static/katex/katex.min.css" />
      <link rel="stylesheet" href="/static/github.min.css" />
      <script defer src="/static/katex/katex.min.js"></script>
      <script defer src="/static/katex/contrib/mhchem.min.js"></script>
      <script defer src="/static/highlight.min.js"></script>

      {{ block "head_extra" . }}{{ end }}
    </head>
    <body>
      {{ block "content" . }}{{ end }}
      {{ block "scripts" . }}{{ end }}
    </body>
  </html>
{{ end }}
